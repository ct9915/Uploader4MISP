{% extends 'base.html' %}

{% block title %}登入 &mdash; Uploader4MISP{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock-fill text-dark" style="font-size: 3rem;"></i>
          <h4 class="mt-2 mb-0">Uploader4MISP</h4>
          <p class="text-muted small">惡意檔案檢測平台</p>
        </div>

        <form method="post" action="{{ url_for('auth.login') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">帳號</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="請輸入帳號" required autofocus autocomplete="username">
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">密碼</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="請輸入密碼" required autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                      tabindex="-1" title="顯示/隱藏密碼">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i>登入
            </button>
          </div>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">
      預設帳號：<code>admin</code> / 密碼：<code>admin</code>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn  = document.getElementById('togglePassword');
  const pwInput    = document.getElementById('password');
  const toggleIcon = document.getElementById('toggleIcon');

  toggleBtn.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type     = isPassword ? 'text' : 'password';
    toggleIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
  });
</script>
{% endblock %}
