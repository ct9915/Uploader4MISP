version: "3.9"

# ── Uploader4MISP – Docker Compose (local / development) ────────────────────
#
# Copy .env.example to .env and fill in the required values before starting.
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: uploader4misp:latest
    container_name: uploader4misp
    restart: unless-stopped

    # Override to dev mode if you need hot-reload (uncomment lines below)
    # command: python run.py
    # environment:
    #   FLASK_ENV: development
    #   FLASK_DEBUG: "true"

    env_file:
      - .env

    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      PORT: ${PORT:-5000}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      SECRET_KEY: ${SECRET_KEY}
      # MISP
      MISP_URL: ${MISP_URL:-}
      MISP_KEY: ${MISP_KEY:-}
      MISP_VERIFYCERT: ${MISP_VERIFYCERT:-false}
      # VirusTotal
      VT_API_KEY: ${VT_API_KEY:-}
      # Mail
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
      # LDAP (optional)
      LDAP_SERVER: ${LDAP_SERVER:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}

    ports:
      - "${HOST_PORT:-5000}:5000"

    volumes:
      # Persist SQLite database and upload data across restarts
      - app_instance:/app/instance

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/login')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  app_instance:
    driver: local
