apiVersion: v1
kind: Service
metadata:
  name: uploader4misp
  namespace: default
  labels:
    app: uploader4misp
spec:
  type: ClusterIP
  selector:
    app: uploader4misp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
---
# Optional: expose via LoadBalancer for direct external access
