apiVersion: v1
kind: Secret
metadata:
  name: uploader4misp-secret
  namespace: default
  labels:
    app: uploader4misp
type: Opaque
# All values must be base64-encoded.
# Encode with: echo -n 'your-value' | base64
stringData:
  SECRET_KEY: "change-me-to-a-strong-random-key"
  MISP_URL: "https://your-misp-instance"
  MISP_KEY: "your-misp-api-key"
  VT_API_KEY: "your-virustotal-api-key"
  MAIL_SERVER: "smtp.example.com"
  MAIL_USERNAME: "user@example.com"
  MAIL_PASSWORD: "your-smtp-password"
  MAIL_DEFAULT_SENDER: "uploader4misp@example.com"
  # Optional LDAP
  LDAP_SERVER: ""
  LDAP_BASE_DN: ""
  LDAP_BIND_DN: ""
  LDAP_BIND_PASSWORD: ""
